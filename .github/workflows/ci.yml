name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  set-grep:
    runs-on: ubuntu-latest
    outputs:
      grep: ${{ steps.compute.outputs.grep }}
    steps:
      - id: compute
        name: Determine TEST_GREP based on trigger
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "grep=@smoke" >> "$GITHUB_OUTPUT"
          else
            echo "grep=" >> "$GITHUB_OUTPUT"
          fi

  unit:
    runs-on: ubuntu-latest
    needs: set-grep
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright test --project=unit
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-unit
          path: allure-results

  api:
    runs-on: ubuntu-latest
    needs: set-grep
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run API tests
        run: |
          if [ -z "${{ needs.set-grep.outputs.grep }}" ]; then
            npx playwright test --project=api
          else
            npx playwright test --project=api --grep "${{ needs.set-grep.outputs.grep }}"
          fi
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-api
          path: allure-results

  web:
    runs-on: ubuntu-latest
    needs: set-grep
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run web tests on ${{ matrix.browser }}
        run: |
          if [ -z "${{ needs.set-grep.outputs.grep }}" ]; then
            npx playwright test --project=${{ matrix.browser }}
          else
            npx playwright test --project=${{ matrix.browser }} --grep "${{ needs.set-grep.outputs.grep }}"
          fi
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-web-${{ matrix.browser }}
          path: allure-results

  report:
    runs-on: ubuntu-latest
    needs: [unit, api, web]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Download all Allure artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Merge Allure results
        run: |
          mkdir -p allure-results
          find artifacts -type d -name allure-results -exec sh -c 'cp -r "$1"/* allure-results/ 2>/dev/null || true' _ {} \;
          find artifacts -type f \( -name "*.json" -o -name "*.png" -o -name "*.txt" \) -exec cp {} allure-results/ \;
      - name: Generate Allure report
        run: |
          npm ci
          npx allure generate allure-results --clean -o allure-report
      - uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
